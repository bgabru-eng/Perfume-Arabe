<script>
const url = "https://opensheet.elk.sh/1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8/Perfumes";

fetch(url)
.then(res => res.json())
.then(data => {

  if (!data || data.length === 0) {
    document.getElementById("products").innerHTML = "No hay productos ❌";
    return;
  }

  let output = "";

  data.forEach(item => {

    console.log(item); // debug

    let nombre = item["Nombre"] || item["Nombre "] || "Perfume";
    let precio = item["Precio"] || item["Precio "] || "Consultar";
    let imagen = item["Imagen"] || item["Imagen "] || "";

    output += `
      <div style="border:1px solid gold; margin:15px; padding:15px; text-align:center;">
        <img src="${imagen}" width="200" onerror="this.src='https://via.placeholder.com/200'"><br><br>
        <h2>${nombre}</h2>
        <p>Precio: ${precio}</p>

        <a href="https://wa.me/5214151234567?text=Hola%20quiero%20comprar%20${nombre}" 
        style="background:gold;color:black;padding:10px;text-decoration:none;">
        Comprar por WhatsApp
        </a>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = output;

})
.catch(error => {
  document.getElementById("products").innerHTML = "Error cargando datos ❌";
  console.log("ERROR:", error);
});
</script>
