<script>
const sheetURL="https://opensheet.elk.sh/1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8/Perfumes";

let productsData=[], cart=[];

function getPrice(p){
 return Number((p||"0").toString().replace(/,/g,''))||0;
}

fetch(sheetURL)
.then(r=>r.json())
.then(data=>{
 productsData=data;
 renderProducts(data);
});

function renderProducts(data){
 let html="";

 data.slice(0,15).forEach(item=>{
 let nombre=item["Nombre"]||"Perfume";
 let precio=getPrice(item["Precio"]);
 let img=item["Imagen"]||"";
 let desc=item["Descripcion"]||"";
 let stock=parseInt(item["Stock"])||0;

 let stockText="",color="green";

 if(stock==0){ stockText="❌ Agotado"; color="red"; }
 else if(stock<=2){ stockText="⚠️ Últimas piezas: "+stock; color="orange"; }
 else{ stockText="🟢 Disponible: "+stock; color="green"; }

 html+=`
 <div class="product">
 <img src="${img}">
 <h3>${nombre}</h3>
 <p>${desc}</p>
 <p><strong>MX$${precio}</strong></p>
 <p style="color:${color};">${stockText}</p>

 <button onclick="addToCart('${nombre}',${precio},${stock})">
 Agregar
 </button>
 </div>
 `;
 });

 document.getElementById("products").innerHTML=html;
}

function addToCart(name,price,stock){
 let count=cart.filter(i=>i.name===name).length;

 if(count>=stock){
   alert("No hay más stock disponible");
   return;
 }

 cart.push({name,price});
 renderCart();
 document.getElementById("cart").classList.add("open");
}

function renderCart(){
 let html="", total=0;

 cart.forEach((i,index)=>{
   total+=i.price;
   html+=`${i.name} MX$${i.price} <button onclick="remove(${index})">❌</button><br>`;
 });

 document.getElementById("cart-items").innerHTML=html;

 let msg="Hola, quiero comprar:%0A";
 cart.forEach(i=>msg+=i.name+" MX$"+i.price+"%0A");
 msg+="Total: MX$"+total;

 document.getElementById("checkout").href="https://wa.me/524613247039?text="+msg;
}

function remove(i){
 cart.splice(i,1);
 renderCart();
}

document.getElementById("cart-toggle").onclick=()=>{
 document.getElementById("cart").classList.toggle("open");
};

function searchProducts(){
 let term=document.getElementById("search-input").value.toLowerCase();
 let filtered=productsData.filter(item =>
 (item["Nombre"]||"").toLowerCase().includes(term)
 );
 renderProducts(filtered);
}

function filterCategory(cat){
 if(cat==="All"){
   renderProducts(productsData);
 } else {
   let filtered=productsData.filter(p=>p["Categoria"]===cat);
   renderProducts(filtered);
 }
}
</script>
