<script>
const sheetID = "1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8";
const sheetName = "Perfumes";
const url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

fetch(url)
  .then(res => res.json())
  .then(data => {
    let output = "";

    data.forEach(item => {

      let name = item.Nombre || "No Name";
      let price = item.Precio || "No Price";
      let img = item.Imagen || "";
      
      output += `
        <div style="border:1px solid gold; margin:10px; padding:10px;">
          <img src="${img}" width="200"><br>
          <h2>${name}</h2>
          <p>Price: ${price}</p>
          <a href="https://wa.me/524613247039?text=I want this perfume: ${name}" 
             style="background:gold;color:black;padding:8px;display:inline-block;margin-top:5px;text-decoration:none;">
             Buy on WhatsApp
          </a>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = output;
  })
  .catch(err => {
    document.getElementById("products").innerHTML = "Error ❌";
    console.log(err);
  });
</script>
