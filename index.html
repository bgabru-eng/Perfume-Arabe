<!DOCTYPE html>
<html>
<head>
  <title>Perfume Store</title>
</head>
<body style="background:black; color:gold; text-align:center;">

<h1>Luxury Perfumes</h1>

<div id="products"></div>

<script>
const sheetID = "1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8";
const url = `https://opensheet.elk.sh/${sheetID}/Sheet1`;

fetch(url)
  .then(res => res.json())
  .then(data => {
    let output = "";
    data.forEach(item => {
      output += `
        <div style="border:1px solid gold; margin:10px; padding:10px;">
          <img src="${item.Imagen}" width="200"><br>
          <h2>${item.Nombre}</h2>
          <p>${item.Precio}</p>
          <a href="https://wa.me/YOURNUMBER" style="background:gold;color:black;padding:5px;">Buy</a>
        </div>
      `;
    });
    document.getElementById("products").innerHTML = output;
  });
</script>

</body>
</html>
