<!DOCTYPE html>
<html>
<head>
  <title>Perfume Store</title>
</head>

<body>

<h1>Luxury Perfumes</h1>

<div id="products">Loading...</div>

<script>
const sheetID = "1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8";
const sheetName = "Perfumes";
const url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

fetch(url)
  .then(res => res.json())
  .then(data => {
    let output = "";

    data.forEach(item => {
      output += `
        <div style="border:1px solid gold; margin:10px; padding:10px;">
          <img src="${item.Imagen}" width="200"><br>
          <h2>${item.Nombre}</h2>
          <p>Price: ${item.Precio}</p>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = output;
  })
  .catch(err => {
    document.getElementById("products").innerHTML = "Error loading ❌";
    console.log(err);
  });
</script>

</body>
</html>
