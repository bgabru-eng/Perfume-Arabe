<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfumes de Lujo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Arial', sans-serif; background:#0c0c0c; color:white; }

/* Header */
header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:#111; border-bottom:2px solid gold; }
header h1 { font-size:24px; font-weight:bold; color:gold; }
.instagram-btn-header { background:#E1306C; color:white; padding:8px 15px; border-radius:5px; font-weight:bold; text-decoration:none; transition:0.3s; }
.instagram-btn-header:hover { background:#C13584; transform:scale(1.05); }

/* Categories */
#categories { text-align:center; margin:20px 0; }
.category-btn { padding:10px 15px; margin:5px; border:none; border-radius:5px; cursor:pointer; background:gold; color:black; font-weight:bold; transition:0.3s; }
.category-btn:hover { background:#ffd700cc; transform:scale(1.05); }

/* Search */
#search { width:90%; padding:10px; margin:0 auto 20px auto; display:block; border-radius:5px; border:none; font-size:16px; }

/* Products grid */
#products { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:15px; justify-items:center; padding:0 10px; }
.product { background:#111; border:1px solid gold; border-radius:10px; padding:15px; text-align:center; transition: transform 0.3s, box-shadow 0.3s; }
.product img { width:200px; height:auto; border-radius:5px; transition:0.3s; }
.product:hover { transform:scale(1.05); box-shadow:0 0 20px gold; }
.product h2 { font-size:18px; margin:10px 0 5px 0; color:gold; }
.product p { font-size:14px; margin:5px 0; }
button { background:gold; color:black; padding:8px 10px; border:none; cursor:pointer; margin-top:5px; border-radius:5px; font-weight:bold; transition:0.3s; }
button:hover { background:#ffd700cc; transform:scale(1.05); }

/* Cart */
#cart-toggle { position:fixed; bottom:20px; right:20px; 
background:linear-gradient(45deg,#FF8C00,#FFD700); color:black; padding:12px; border-radius:50%; font-weight:bold; cursor:pointer; z-index:1001; box-shadow:0 0 15px gold; transition:0.3s; }
#cart-toggle:hover { transform:scale(1.1); }

#cart { position:fixed; top:10px; right:-350px; width:300px; max-height:80vh; overflow-y:auto; background:#111; border:2px solid gold; padding:10px; border-radius:10px; z-index:1000; transition:0.5s; }
#cart.open { right:10px; }
#cart h3 { text-align:center; margin-bottom:10px; color:gold; }
#cart-items p { margin:5px 0; display:flex; justify-content: space-between; align-items: center; }
.remove-btn { background:#ff4444; color:white; border:none; border-radius:3px; padding:2px 5px; cursor:pointer; margin-left:5px; }

/* Footer */
#footer { text-align:center; padding:15px; margin-top:40px; border-top:1px solid gold; color:gold; font-size:14px; }
#footer p { margin:3px 0; }

/* Mobile */
@media(max-width:600px){
  #cart { width:90%; right:-95%; }
  #products { grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); }
  header { flex-direction:column; gap:10px; text-align:center; }
}
</style>
</head>
<body>

<header>
  <h1>Perfumes de Lujo</h1>
  <a href="https://www.instagram.com/indiaenmexico/" target="_blank" class="instagram-btn-header">Instagram</a>
</header>

<div id="categories">
  <button class="category-btn" onclick="filterCategory('Dama')">Dama</button>
  <button class="category-btn" onclick="filterCategory('Caballero')">Caballero</button>
  <button class="category-btn" onclick="filterCategory('Unisex')">Unisex</button>
  <button class="category-btn" onclick="filterCategory('All')">Todos</button>
</div>

<input type="text" id="search" placeholder="Buscar perfume...">

<div id="products"></div>

<div id="cart-toggle">🛒</div>
<div id="cart">
  <h3>Carrito</h3>
  <div id="cart-items"></div>
  <p><strong>Envío:</strong> $200</p>
  <p><strong>Total: $<span id="total">0</span></strong></p>
  <p id="total-letras"></p>
  <a id="checkout" href="#" target="_blank"><button>Comprar en WhatsApp</button></a>
</div>

<div id="footer">
  <p>Dirección: Soriana 200, 12 de Octubre Local 22, Nuevo Celaya, 38027 Celaya, Gto. México</p>
  <p>© 2026 Perfumes de Lujo</p>
</div>

<script>
// Number to words (simple)
function numeroALetras(num){
    const unidades = ['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve'];
    const decenas = ['','diez','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
    if(num<=9) return unidades[num];
    if(num<=99) return decenas[Math.floor(num/10)] + (num%10>0 ? ' y ' + unidades[num%10]:'');
    return num;
}

const sheetURL = "https://opensheet.elk.sh/1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8/Perfumes";
let productsData = [];
let filteredData = [];
let cart = [];
const shipping = 200;

function getPrice(item){
  let precio = item["Precio"] || item["Precio "] || item["precio"] || "0";
  if(typeof precio === "string"){ precio = precio.replace(/,/g,'').trim(); }
  precio = parseFloat(precio);
  if(isNaN(precio) || precio <= 0) precio = 0;
  return precio;
}

function renderProducts(data){
  const productsDiv = document.getElementById("products");
  productsDiv.innerHTML = "";
  data.forEach(item=>{
    let nombre = item["Nombre"] || "Perfume";
    let precio = getPrice(item);
    let imagen = item["Imagen"] || "";
    let descripcion = item["Descripcion"] || "Sin descripción";
    let categoria = item["Categoria"] || "Unisex";

    const productDiv = document.createElement("div");
    productDiv.className = "product";
    productDiv.innerHTML = `
      <img src="${imagen}" onerror="this.src='https://via.placeholder.com/200'">
      <h2>${nombre}</h2>
      <p><strong>Precio:</strong> $${precio}</p>
      <p><strong>Descripción:</strong> ${descripcion}</p>
      <p><strong>Categoria:</strong> ${categoria}</p>
      <button class="add-btn">Agregar al carrito</button>
    `;
    productDiv.querySelector(".add-btn").addEventListener("click", ()=>{ addToCart(nombre, item); });
    productsDiv.appendChild(productDiv);
  });
}

function addToCart(nombre,item){
  let precioNum = getPrice(item);
  cart.push({nombre, precio: precioNum});
  renderCart();
}

function removeFromCart(index){
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  const cartItemsDiv = document.getElementById("cart-items");
  cartItemsDiv.innerHTML = "";
  let subtotal = 0;
  cart.forEach((item,index)=>{
    let precioNum = parseFloat(item.precio) || 0;
    subtotal += precioNum;
    const p = document.createElement("p");
    p.innerHTML = `${item.nombre} - $${precioNum} <button class="remove-btn" onclick="removeFromCart(${index})">❌</button>`;
    cartItemsDiv.appendChild(p);
  });
  let total = subtotal + shipping;
  document.getElementById("total").textContent = total.toFixed(2);
  document.getElementById("total-letras").textContent = `Total en letras: ${numeroALetras(total)} pesos`;

  const checkoutBtn = document.getElementById("checkout");
  if(cart.length>0){
    let msg = "Hola,%20quiero%20comprar%20estos%20perfumes:%0A";
    cart.forEach((item,i)=>{
      let precioNum = parseFloat(item.precio) || 0;
      msg += `${i+1}. ${item.nombre} - $${precioNum}%0A`;
    });
    msg += `Subtotal: $${subtotal}%0AEnvío: $${shipping}%0ATotal: $${total.toFixed(2)}`;
    checkoutBtn.href = `https://wa.me/524613247039?text=${msg}`;
  } else { checkoutBtn.href="#"; }
}

// Cart toggle
document.getElementById("cart-toggle").addEventListener("click",()=>{
  document.getElementById("cart").classList.toggle("open");
});

function filterCategory(cat){
  if(cat==="All"){ filteredData = productsData; } 
  else{ filteredData = productsData.filter(p=> (p["Categoria"]||"Unisex").toLowerCase()===cat.toLowerCase()); }
  renderProducts(filteredData);
}

document.getElementById("search").addEventListener("input",function(e){
  let searchTerm = e.target.value.toLowerCase();
  let filtered = filteredData.filter(p=> (p["Nombre"]||"").toLowerCase().includes(searchTerm));
  renderProducts(filtered);
});

fetch(sheetURL).then(res=>res.json()).then(data=>{
  productsData = data; filteredData = productsData; renderProducts(productsData);
}).catch(err=>{
  console.log("ERROR FETCH:",err);
  document.getElementById("products").innerHTML="Error cargando datos ❌";
});
</script>

</body>
</html>
