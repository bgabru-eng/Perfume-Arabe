<!DOCTYPE html>
<html>
<head>
  <title>Perfumes de Lujo</title>
</head>

<body style="background:black; color:white; font-family:sans-serif;">

<h1 style="text-align:center;">Perfumes de Lujo</h1>

<div id="products"></div>

<script>
const sheetID = "1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8";
const sheetName = "Perfumes";
const url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

fetch(url)
  .then(res => res.json())
  .then(data => {
    let output = "";

    data.forEach(item => {

      // 🔥 SAFE VALUES (undefined fix)
      let nombre = item["Nombre"] ? item["Nombre"] : "Perfume";
      let precio = item["Precio"] ? item["Precio"] : "Consultar";
      let imagen = item["Imagen"] ? item["Imagen"] : "";

      output += `
        <div style="border:1px solid gold; margin:15px; padding:15px; text-align:center;">
          <img src="${imagen}" width="200"><br><br>
          <h2>${nombre}</h2>
          <p>Precio: ${precio}</p>
          
          <a href="https://wa.me/5214613247039?text=Hola quiero comprar: ${nombre}" 
             style="background:gold;color:black;padding:10px;text-decoration:none;display:inline-block;margin-top:10px;">
             Comprar por WhatsApp
          </a>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = output;
  })
  .catch(error => {
    document.getElementById("products").innerHTML = "Error al cargar ❌";
    console.log(error);
  });
</script>

</body>
</html>
