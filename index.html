<script>
const url = "https://opensheet.elk.sh/1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8/Perfumes";

fetch(url)
.then(res => res.json())
.then(data => {
  let output = "";

  data.forEach(item => {

    // 🔥 SPACE FIX
    let nombre = item["Nombre "] || "Perfume";
    let precio = item["Precio "] || "Consultar";
    let imagen = item["Imagen "] || "";

    output += `
      <div style="border:1px solid gold; margin:15px; padding:15px; text-align:center;">
        <img src="${imagen}" width="200"><br><br>
        <h2>${nombre}</h2>
        <p>Precio: ${precio}</p>

        <a href="https://wa.me/524613247039?text=Hola%20quiero%20comprar%20${nombre}" 
        style="background:gold;color:black;padding:10px;text-decoration:none;">
        Comprar por WhatsApp
        </a>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = output;
});
</script>
