<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfume Árabe Original Importación</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; background:#0c0c0c; color:white; }
#products { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:15px; }
.product { background:#111; border:1px solid gold; padding:15px; text-align:center; }
.product img { width:200px; }
.product h2 { color:gold; }
</style>
</head>

<body>

<h1 style="text-align:center;color:gold;">Perfumes</h1>

<div id="products"></div>

<script>

const sheetURL = "https://opensheet.elk.sh/1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8/Perfumes";

function getPrice(item){
  let precio = item["Precio"] || "0";
  precio = precio.toString().replace(/,/g,'').trim();
  let num = Number(precio);
  if(isNaN(num)) return 0;
  return num;
}

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  renderProducts(data);
});

function renderProducts(data){
  const productsDiv = document.getElementById("products");
  productsDiv.innerHTML="";

  data.forEach(item=>{
    let nombre = item["Nombre"] || "Perfume";
    let precio = getPrice(item);
    let imagen = item["Imagen"] || "";
    let stock = parseInt(item["Stock"]) || 0;

    let stockText = "";
    let color = "green";

    if(stock === 0){
      stockText = "स्टॉक समाप्त";
      color = "red";
    }else if(stock <= 2){
      stockText = "सिर्फ " + stock + " बचा";
      color = "#FF4500";
    }else if(stock <= 5){
      stockText = "थोड़ा स्टॉक: " + stock;
      color = "orange";
    }else{
      stockText = "स्टॉक उपलब्ध: " + stock;
      color = "green";
    }

    const div = document.createElement("div");
    div.className="product";

    div.innerHTML = `
      <img src="${imagen}" onerror="this.src='https://via.placeholder.com/200'">
      <h2>${nombre}</h2>
      <p>Precio: ${precio}</p>
      <p style="color:${color}; font-weight:bold;">${stockText}</p>
    `;

    productsDiv.appendChild(div);
  });
}

</script>

</body>
</html>
