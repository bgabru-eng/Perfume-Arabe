<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfume Store</title>

<style>
body {
font-family: Arial;
background: #111;
color: white;
text-align: center;
}

.products {
display: flex;
flex-wrap: wrap;
justify-content: center;
}

.card {
background: #222;
margin: 10px;
padding: 15px;
border-radius: 10px;
width: 200px;
}

img {
width: 100%;
border-radius: 10px;
}

button {
background: gold;
border: none;
padding: 10px;
cursor: pointer;
}
</style>

</head>

<body>

<h1>Premium Perfumes</h1>

<div class="products" id="products"></div>

<script>

// 🔥 तुम्हारा Google Sheet CSV link
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLO4uZBbBt3BC2ukZH6WPEnh1Taw_JEQSUAg7lVF2tmXgGH1Hb19ggbFTvTVGem2yO480fc5yEJWRR/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {
    
    const rows = data.split("\n").slice(1); // header skip
    const container = document.getElementById("products");

    rows.forEach(row => {
        const cols = row.split(",");

        const name = cols[0];
        const price = cols[1];
        const desc = cols[2];
        const image = cols[3];

        const card = `
        <div class="card">
            <img src="${image}">
            <h2>${name}</h2>
            <p>${price} MXN</p>
            <button onclick="order('${name}')">Order on WhatsApp</button>
        </div>
        `;

        container.innerHTML += card;
    });

});

function order(product) {
    window.open(`https://wa.me/524613247039?text=I want to buy ${product}`);
}

</script>

</body>
</html>
